name: Daily Crawl

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 (한국 기준)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 라이브러리 설치
        run: |
          pip install requests beautifulsoup4

      - name: 크롤링 실행
        run: python crawler.py

      - name: 결과 저장
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "자동 업데이트"
          git push
