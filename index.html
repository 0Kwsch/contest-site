<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공모전 크롤링 서비스</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    width: 250px;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>
<body>

<h1>📌 공모전 목록</h1>

<div class="container" id="list"></div>

<script>
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list");

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${item.title}</h3>
        <p>주최: ${item.host}</p>
        <p>마감일: ${item.date}</p>
      `;

      list.appendChild(div);
    });
  });
</script>

</body>
</html>
