<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공모전 크롤링 서비스</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    margin-top: 30px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    width: 250px;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
</style>

</head>
<body>

<h1> 공모전 크롤링 서비스</h1>
<p id = "updateTimes"></p>
<div class="container" id="list"></div>

<script>
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list");

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>
          <a href="${item.link}" target="_blank">
            ${item.title}
          </a>
        </h3>
        <p><strong>주최:</strong> ${item.host}</p>
        <p><strong>마감일:</strong> ${item.date}</p>
      `;

      list.appendChild(div);
    });
  });
</script>

</body>
</html>
